<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimizador de cajas</title>
  <style>
    :root{
      --rb-orange:#ff8500;
      --rb-black:#0b0f14;
      --rb-gray:#5c6776;
      --rb-navy:#1e2733;
      --rb-border:#d7dee7;
      --rb-bg:#f2f4f7;
      --rb-card:#ffffff;
      --rb-soft:#f7f9fc;
      --rb-line:#c7d0dc;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:var(--rb-bg);
      color:var(--rb-navy);
    }

    body{min-width:320px}

    /* =====================
       1) Layout principal
       ===================== */
    .app{
      width:100%;
      max-width:1550px;
      margin:0 auto;
      padding:14px;
    }

    .header{margin-bottom:10px}

    .header h1{
      margin:0;
      font-size:clamp(28px,3.5vw,44px);
      line-height:1.03;
      letter-spacing:-.01em;
    }

    .header .tag{
      color:var(--rb-gray);
      font-size:12px;
      margin-top:2px;
    }

    .toolbar{
      background:var(--rb-card);
      border:1px solid var(--rb-border);
      border-radius:12px;
      padding:10px;
      margin-bottom:10px;
      display:flex;
      gap:8px;
      align-items:stretch;
      flex-wrap:wrap;
    }

    .search-wrap{position:relative;flex:1 1 520px;min-width:220px}

    .search-wrap input{
      width:100%;
      min-height:42px;
      padding:9px 12px;
      border:1px solid var(--rb-border);
      border-radius:9px;
      font-size:14px;
      color:var(--rb-navy);
      outline:none;
      background:#fff;
    }

    .search-wrap input:focus{
      border-color:var(--rb-orange);
      box-shadow:0 0 0 3px rgba(255,133,0,.12);
    }

    .results-dropdown{
      position:absolute;
      top:46px;
      left:0;
      right:0;
      background:#fff;
      border:1px solid var(--rb-border);
      border-radius:10px;
      max-height:260px;
      overflow:auto;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      display:none;
      z-index:50;
    }

    .result-item{padding:9px 10px;border-bottom:1px solid #f0f2f6;cursor:pointer;font-size:13px;line-height:1.3}
    .result-item:last-child{border-bottom:none}
    .result-item:hover{background:#fff7ef}

    button{min-height:42px;padding:9px 14px;border:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px;white-space:nowrap}
    .btn-primary{background:var(--rb-orange);color:#fff}
    .btn-primary:hover{filter:brightness(.97)}

    .status{font-size:12px;color:var(--rb-gray);margin-bottom:10px;padding:0 2px}

    .main-grid{
      display:grid;
      grid-template-columns:290px minmax(0,1fr);
      gap:10px;
      align-items:start;
    }

    .panel{
      background:var(--rb-card);
      border:1px solid var(--rb-border);
      border-radius:12px;
      min-width:0;
    }

    /* =====================
       2) Panel de resumen
       ===================== */
    .summary-panel{padding:10px;display:flex;flex-direction:column;gap:8px;position:sticky;top:10px}

    .panel-title{margin:0;font-size:15px;color:var(--rb-navy);font-weight:700;letter-spacing:.01em}

    .summary-lines{
      font-size:12px;
      line-height:1.35;
      word-break:break-word;
      border-bottom:1px solid #edf1f6;
      padding-bottom:8px;
      margin:0;
    }

    .summary-lines .row{
      display:grid;
      grid-template-columns:86px 1fr;
      gap:6px;
      padding:2px 0;
    }

    .summary-lines .row b{color:#111827;font-weight:700}

    .pill{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:700;vertical-align:middle}
    .pill-ok{background:rgba(255,133,0,.12);color:var(--rb-orange)}

    .kpi{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px;
    }

    .kpi-cell{
      background:var(--rb-soft);
      border:1px solid #e8edf4;
      border-radius:9px;
      padding:7px 8px;
      min-height:58px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .kpi-title{font-size:11px;color:var(--rb-gray);line-height:1.15}
    .kpi-value{font-size:19px;font-weight:700;line-height:1.05;color:var(--rb-black)}
    .kpi-value.small{font-size:14px}

    /* =====================
       3) Render técnico
       ===================== */
    .tech-panel{padding:10px 10px 12px}

    .tech-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      margin-bottom:8px;
      padding-bottom:7px;
      border-bottom:1px solid #edf1f6;
    }

    .tech-sub{color:var(--rb-gray);font-size:12px}

    .views-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      align-items:stretch;
      min-height:470px;
    }

    .tech-view{display:flex;flex-direction:column;min-width:0}
    .view-title{font-size:12px;font-weight:700;color:#2d3a4a;margin:0 0 4px 2px;letter-spacing:.015em}

    .svg-wrap{
      width:100%;
      flex:1;
      border:1px solid #e2e8f0;
      border-radius:10px;
      background:#fcfdff;
      overflow:hidden;
      -webkit-overflow-scrolling:touch;
      padding:4px;
      aspect-ratio: 920 / 640;
      min-height:280px;
      display:flex;
      align-items:stretch;
    }

    .svg-wrap svg{display:block;width:100%;height:100%;min-width:0;flex:1 1 auto}
    .svg-wrap.is-scrollable{overflow:auto}

    .tech-meta{margin-top:6px;font-size:11px;color:var(--rb-gray);line-height:1.35;padding:0 2px}
    .tech-figure{width:100%;height:100%;display:flex}

    .foot-note{margin-top:6px;color:var(--rb-gray);font-size:11px}

    .table-card{margin-top:10px;padding:10px}
    .table-card h3{margin:0 0 6px 0;font-size:15px}
    .table-wrap{width:100%;overflow:auto;border-radius:10px;border:1px solid #e6ebf2}

    table{width:100%;min-width:760px;border-collapse:collapse;font-size:12px;background:#fff}
    th,td{border:1px solid #edf1f5;padding:8px 7px;text-align:left;vertical-align:middle}
    th{background:#1f2937;color:#fff;font-weight:700;position:sticky;top:0;z-index:1}
    tr:nth-child(even) td{background:#fafbfd}

    /* =====================
       4) Responsivo
       ===================== */
    @media (max-width: 1180px){
      .main-grid{grid-template-columns:1fr}
      .summary-panel{position:static}
      .views-grid{grid-template-columns:1fr}
    }

    @media (max-width: 768px){
      .app{padding:10px}
      .toolbar{padding:8px}
      .search-wrap{flex:1 1 100%}
      .btn-primary{width:100%}
      .summary-lines .row{grid-template-columns:78px 1fr}
      .kpi-value{font-size:17px}
      .kpi-value.small{font-size:13px}
      .views-grid{min-height:unset}
      .svg-wrap svg{min-width:260px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Optimizador de cajas</h1>
      <div class="tag">Ribetec · simulador de acomodo técnico</div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input
          id="skuSearch"
          type="text"
          placeholder="Buscar SKU o descripción…"
          oninput="filtrarSkus()"
          onfocus="filtrarSkus()"
          autocomplete="off"
        />
        <div id="dropdown" class="results-dropdown"></div>
      </div>
      <button class="btn-primary" onclick="simular()">Simular</button>
    </div>

    <div id="estado" class="status">Cargando SKUs…</div>

    <div class="main-grid">
      <aside class="panel summary-panel">
        <h3 class="panel-title">Resumen técnico</h3>
        <div id="resumen" class="summary-lines">Selecciona un SKU.</div>
        <div id="kpis" class="kpi"></div>
      </aside>

      <section class="panel tech-panel">
        <div class="tech-head">
          <h3 class="panel-title">Acomodo técnico</h3>
          <div class="tech-sub">Vista superior y lateral proporcional</div>
        </div>

        <div class="views-grid">
          <div class="tech-view">
            <div class="view-title">VISTA SUPERIOR</div>
            <div id="layoutTop" class="svg-wrap"></div>
          </div>
          <div class="tech-view">
            <div class="view-title">VISTA LATERAL</div>
            <div id="layoutSide" class="svg-wrap"></div>
            <div id="layoutSideMeta" class="tech-meta"></div>
          </div>
        </div>

        <div class="foot-note">Representación técnica simplificada con medidas útiles de caja.</div>
      </section>
    </div>

    <div class="panel table-card">
      <h3>Comparativo por caja</h3>
      <div id="tabla"></div>
    </div>
  </div>

  <script>
    let skuCatalogo = [];
    let skuSeleccionado = null;

    function cargarSkus() {
      google.script.run
        .withSuccessHandler(data => {
          skuCatalogo = data || [];
          document.getElementById('estado').textContent = 'Listo para buscar.';
        })
        .withFailureHandler(err => {
          document.getElementById('estado').textContent = 'Error cargando SKUs: ' + (err.message || err);
        })
        .getSkusWeb();
    }

    function filtrarSkus() {
      const input = document.getElementById('skuSearch');
      const dropdown = document.getElementById('dropdown');
      const q = (input.value || '').trim().toLowerCase();

      const filtrados = skuCatalogo
        .filter(item => {
          const codigo = String(item.codigo || '').toLowerCase();
          const descripcion = String(item.descripcion || '').toLowerCase();
          return codigo.includes(q) || descripcion.includes(q);
        })
        .slice(0, 20);

      if (!q && !filtrados.length) {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        return;
      }

      dropdown.innerHTML = filtrados.map(item => `
        <div class="result-item" onclick="seleccionarSku('${escapeJs(item.codigo)}')">
          <strong>${escapeHtml(item.codigo)}</strong><br>
          <span>${escapeHtml(item.descripcion || '')}</span>
        </div>
      `).join('');

      dropdown.style.display = filtrados.length ? 'block' : 'none';
    }

    function seleccionarSku(codigo) {
      const item = skuCatalogo.find(x => String(x.codigo) === String(codigo));
      if (!item) return;

      skuSeleccionado = item.codigo;
      document.getElementById('skuSearch').value =
        `${item.codigo} - ${item.descripcion || ''}`;

      document.getElementById('dropdown').style.display = 'none';
    }

    function simular() {
      if (!skuSeleccionado) {
        const txt = document.getElementById('skuSearch').value.trim();
        const exacto = skuCatalogo.find(x => txt.startsWith(String(x.codigo)));
        if (exacto) skuSeleccionado = exacto.codigo;
      }

      if (!skuSeleccionado) {
        document.getElementById('estado').textContent = 'Selecciona un SKU válido.';
        return;
      }

      document.getElementById('estado').textContent = 'Calculando…';

      google.script.run
        .withSuccessHandler(renderResultado)
        .withFailureHandler(err => {
          document.getElementById('estado').textContent = 'Error: ' + (err.message || err);
        })
        .simularSkuWeb(skuSeleccionado);
    }

    function renderResultado(data) {
      const mejor = data.mejor;
      const rollo = data.rollo;

      document.getElementById('estado').textContent = 'Simulación lista.';

      document.getElementById('resumen').innerHTML = `
        <div class="row"><b>SKU</b><span>${escapeHtml(rollo.codigo)}</span></div>
        <div class="row"><b>Desc.</b><span>${escapeHtml(rollo.descripcion || '')}</span></div>
        <div class="row"><b>Caja</b><span>${escapeHtml(mejor.tipo_caja)}</span></div>
        <div class="row"><b>Orienta.</b><span>${escapeHtml(mejor.orientacion)}</span></div>
        <div class="row"><b>Estatus</b><span class="pill pill-ok">${escapeHtml(mejor.estatus)}</span></div>
      `;

      document.getElementById('kpis').innerHTML = `
        <div class="kpi-cell">
          <div class="kpi-title">Cantidad máx.</div>
          <div class="kpi-value">${num(mejor.cantidad_max)}</div>
        </div>
        <div class="kpi-cell">
          <div class="kpi-title">Niveles</div>
          <div class="kpi-value">${num(mejor.niveles)}</div>
        </div>
        <div class="kpi-cell">
          <div class="kpi-title">Piezas largo</div>
          <div class="kpi-value">${num(mejor.piezas_largo)}</div>
        </div>
        <div class="kpi-cell">
          <div class="kpi-title">Piezas ancho</div>
          <div class="kpi-value">${num(mejor.piezas_ancho)}</div>
        </div>
        <div class="kpi-cell">
          <div class="kpi-title">Ø efectivo</div>
          <div class="kpi-value small">${num(mejor.diametro_efectivo_mm)} mm</div>
        </div>
        <div class="kpi-cell">
          <div class="kpi-title">Ancho efectivo</div>
          <div class="kpi-value small">${num(mejor.ancho_efectivo_mm)} mm</div>
        </div>
      `;

      document.getElementById('layoutTop').innerHTML = generarSVGTop(mejor);
      renderSideView(mejor);
      document.getElementById('tabla').innerHTML = generarTabla(data.resultados);
    }

    const TECH_VIEW = {
      width: 920,
      height: 640,
      marginTop: 52,
      marginRight: 96,
      marginBottom: 88,
      marginLeft: 68
    };

    function buildTechnicalCanvas(drawMmW, drawMmH) {
      const drawW = TECH_VIEW.width - TECH_VIEW.marginLeft - TECH_VIEW.marginRight;
      const drawH = TECH_VIEW.height - TECH_VIEW.marginTop - TECH_VIEW.marginBottom;
      const scale = Math.min(drawW / Math.max(drawMmW, 1), drawH / Math.max(drawMmH, 1));
      const boxW = drawMmW * scale;
      const boxH = drawMmH * scale;
      const ox = TECH_VIEW.marginLeft + ((drawW - boxW) / 2);
      const oy = TECH_VIEW.marginTop + ((drawH - boxH) / 2);
      return { scale, boxW, boxH, ox, oy };
    }

    function generateBoxGuides({ ox, oy, boxW, boxH, hLabel, vLabel }) {
      const xDimY = oy + boxH + 20;
      const yDimX = ox + boxW + 20;
      return `
        <line x1="${ox}" y1="${xDimY}" x2="${ox + boxW}" y2="${xDimY}" stroke="#ff8500" stroke-width="1.8"/>
        <text x="${ox + boxW / 2}" y="${xDimY - 6}" text-anchor="middle" font-size="12" fill="#ff8500">${escapeHtml(hLabel)}</text>
        <line x1="${yDimX}" y1="${oy}" x2="${yDimX}" y2="${oy + boxH}" stroke="#ff8500" stroke-width="1.8"/>
        <text x="${yDimX + 14}" y="${oy + boxH / 2}" font-size="12" fill="#ff8500" transform="rotate(90 ${yDimX + 14} ${oy + boxH / 2})">${escapeHtml(vLabel)}</text>
      `;
    }

    function generarSVGTop(m) {
      const cajaW = Number(m.largo_caja_mm) || 1;
      const cajaH = Number(m.ancho_caja_mm) || 1;
      const diam = Number(m.diametro_efectivo_mm) || 1;
      const piezasLargo = Math.max(0, Number(m.piezas_largo) || 0);
      const piezasAncho = Math.max(0, Number(m.piezas_ancho) || 0);
      const total = Number(m.cantidad_max) || 0;
      const niveles = Number(m.niveles) || 0;
      const ctx = buildTechnicalCanvas(cajaW, cajaH);

      const diamPx = diam * ctx.scale;
      const r = diamPx / 2;
      let circles = '';

      for (let row = 0; row < piezasAncho; row++) {
        for (let col = 0; col < piezasLargo; col++) {
          const cx = ctx.ox + r + col * diamPx;
          const cy = ctx.oy + r + row * diamPx;
          circles += `
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="#ffffff" stroke="#4f5f70" stroke-width="1.2"/>
            <circle cx="${cx}" cy="${cy}" r="${Math.max(r * 0.22, 2.6)}" fill="#edf2f7" stroke="#4f5f70" stroke-width="0.8"/>
          `;
        }
      }

      return `
        <svg width="${TECH_VIEW.width}" height="${TECH_VIEW.height}" viewBox="0 0 ${TECH_VIEW.width} ${TECH_VIEW.height}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect x="0" y="0" width="${TECH_VIEW.width}" height="${TECH_VIEW.height}" fill="#ffffff"/>
          <rect x="${ctx.ox}" y="${ctx.oy}" width="${ctx.boxW}" height="${ctx.boxH}" fill="#f8fbff" stroke="#1e2937" stroke-width="2"/>
          ${circles}
          ${generateBoxGuides({
            ox: ctx.ox,
            oy: ctx.oy,
            boxW: ctx.boxW,
            boxH: ctx.boxH,
            hLabel: `${num(m.largo_caja_mm)} mm largo`,
            vLabel: `${num(m.ancho_caja_mm)} mm ancho`
          })}
          <text x="22" y="26" font-size="13" font-weight="700" fill="#1f2937">${escapeHtml(m.tipo_caja)} · vista superior</text>
          <text x="22" y="604" font-size="12" fill="#3b4654">Capa: ${piezasLargo} × ${piezasAncho} (${piezasLargo * piezasAncho})</text>
          <text x="330" y="604" font-size="12" fill="#3b4654">Niveles: ${niveles}</text>
          <text x="452" y="604" font-size="12" fill="#ff8500" font-weight="700">Total: ${total} rollos</text>
        </svg>
      `;
    }

    function valorNumericoSeguro(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function buildSideViewSvg(m) {
      const cajaBase = valorNumericoSeguro(m.largo_caja_mm, 1);
      const cajaAlto = valorNumericoSeguro(m.alto_caja_mm, valorNumericoSeguro(m.alto_total_mm, 1));
      const niveles = Math.max(0, valorNumericoSeguro(m.niveles, 0));
      const piezasLargo = Math.max(0, valorNumericoSeguro(m.piezas_largo, 0));
      const diametro = valorNumericoSeguro(m.diametro_efectivo_mm, 1);
      const altoRollo = valorNumericoSeguro(m.ancho_efectivo_mm, 1);
      const ctx = buildTechnicalCanvas(cajaBase, cajaAlto);

      const rollW = diametro * ctx.scale;
      const rollH = altoRollo * ctx.scale;
      const cols = Math.max(1, piezasLargo);
      const rows = Math.max(1, niveles);

      const gridW = rollW * cols;
      const gridH = rollH * rows;
      const offsetX = ctx.ox + ((ctx.boxW - gridW) / 2);
      const offsetY = ctx.oy + ctx.boxH - gridH;

      let stacks = '';
      for (let nivel = 0; nivel < niveles; nivel++) {
        const y = offsetY + (rows - 1 - nivel) * rollH;
        const tagY = y + (rollH / 2) + 3;
        stacks += `<text x="${ctx.ox - 8}" y="${tagY}" text-anchor="end" font-size="10" fill="#667085">N${nivel + 1}</text>`;

        for (let col = 0; col < cols; col++) {
          const x = offsetX + col * rollW;
          const arcH = Math.max(rollH * 0.2, 2.2);
          stacks += `
            <rect x="${x}" y="${y + arcH / 2}" width="${rollW}" height="${Math.max(rollH - arcH, 2)}" fill="#ffffff" stroke="#4f5f70" stroke-width="1"/>
            <ellipse cx="${x + rollW / 2}" cy="${y + arcH / 2}" rx="${rollW / 2}" ry="${arcH / 2}" fill="#f1f5fa" stroke="#4f5f70" stroke-width="1"/>
            <ellipse cx="${x + rollW / 2}" cy="${y + rollH - arcH / 2}" rx="${rollW / 2}" ry="${arcH / 2}" fill="none" stroke="#c7d0dc" stroke-width="0.8"/>
          `;
        }
      }

      return `
        <svg width="${TECH_VIEW.width}" height="${TECH_VIEW.height}" viewBox="0 0 ${TECH_VIEW.width} ${TECH_VIEW.height}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect x="0" y="0" width="${TECH_VIEW.width}" height="${TECH_VIEW.height}" fill="#ffffff"/>
          <rect x="${ctx.ox}" y="${ctx.oy}" width="${ctx.boxW}" height="${ctx.boxH}" fill="#f8fbff" stroke="#1e2937" stroke-width="2"/>
          <line x1="${ctx.ox}" y1="${ctx.oy + ctx.boxH}" x2="${ctx.ox + ctx.boxW}" y2="${ctx.oy + ctx.boxH}" stroke="#8ea0b5" stroke-width="1" stroke-dasharray="4 4"/>
          ${stacks}
          ${generateBoxGuides({
            ox: ctx.ox,
            oy: ctx.oy,
            boxW: ctx.boxW,
            boxH: ctx.boxH,
            hLabel: `${num(m.largo_caja_mm)} mm base`,
            vLabel: `${num(cajaAlto)} mm altura útil`
          })}
          <text x="22" y="26" font-size="13" font-weight="700" fill="#1f2937">${escapeHtml(m.tipo_caja)} · vista lateral</text>
        </svg>
      `;
    }

    function buildSideViewMeta(m) {
      return `
        Piezas/capa: ${num((valorNumericoSeguro(m.piezas_largo, 0) || 0) * (valorNumericoSeguro(m.piezas_ancho, 0) || 0))} ·
        Columnas: ${num(valorNumericoSeguro(m.piezas_largo, 0))} ·
        Fondo: ${num(valorNumericoSeguro(m.piezas_ancho, 0))} ·
        Niveles: ${num(valorNumericoSeguro(m.niveles, 0))}
      `;
    }


    function renderSideView(m) {
      const figureContainer = document.getElementById('layoutSide');
      const metaContainer = document.getElementById('layoutSideMeta');
      if (!figureContainer) return;

      figureContainer.innerHTML = buildSideViewSvg(m);
      if (metaContainer) {
        metaContainer.innerHTML = buildSideViewMeta(m);
      }
    }

    function generarTabla(rows) {
      const body = (rows || []).map(r => `
        <tr>
          <td>${escapeHtml(r.tipo_caja)}</td>
          <td>${num(r.piezas_largo)}</td>
          <td>${num(r.piezas_ancho)}</td>
          <td>${num(r.niveles)}</td>
          <td>${num(r.cantidad_max)}</td>
          <td>${(Number(r.aprovechamiento || 0) * 100).toFixed(2)}%</td>
          <td><span class="pill pill-ok">${escapeHtml(r.estatus || '')}</span></td>
        </tr>
      `).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Caja</th>
                <th>Piezas largo</th>
                <th>Piezas ancho</th>
                <th>Niveles</th>
                <th>Total</th>
                <th>Aprovechamiento</th>
                <th>Estatus</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function num(v) {
      if (v === null || v === undefined || v === '') return '';
      const n = Number(v);
      return Number.isFinite(n)
        ? n.toLocaleString('es-MX', { maximumFractionDigits: 2 })
        : escapeHtml(v);
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeJs(str) {
      return String(str ?? '')
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('dropdown');
      const search = document.getElementById('skuSearch');
      if (dropdown && search && !dropdown.contains(e.target) && e.target !== search) {
        dropdown.style.display = 'none';
      }
    });

    cargarSkus();
  </script>
</body>
</html>
